name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('**/requirements*.txt') }}-pypdf-cryptography-Pillow-reportlab

      - name: Install dependencies
        run: pip install pypdf cryptography Pillow reportlab pytest

      - name: Run tests with verbose output
        run: python -m pytest tests/ -v --tb=short

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Stamp build version into index.html
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'EOF'
          import os, datetime
          sha  = os.environ['COMMIT_SHA'][:7]
          date = datetime.date.today().isoformat()
          ver  = f'{sha} {date}'
          html = open('index.html').read()
          if '__BUILD_VERSION__' not in html:
              print('ERROR: placeholder not found in index.html'); exit(1)
          open('index.html', 'w').write(html.replace('__BUILD_VERSION__', ver))
          print(f'Stamped build version: {ver}')
          EOF
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
